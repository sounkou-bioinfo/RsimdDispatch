# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,     r: 'release'}
          - {os: windows-latest,   r: 'release'}
          - {os: windows-11-arm,   r: 'release'}
          - {os: ubuntu-24.04-arm, r: 'release'}
          - {os: ubuntu-latest,    r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,    r: 'release'}
          - {os: ubuntu-latest,    r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check template sync
        if: runner.os == 'Linux'
        run: make check-template-sync

      - name: Install and run copied template package
        if: runner.os == 'Linux'
        run: |
          R CMD INSTALL --preclean .
          Rscript - <<'EOF'
          tmp <- file.path(tempdir(), "TestSIMD")
          dir.create(tmp)
          writeLines(c(
            "Package: TestSIMD",
            "Title: Test SIMD Dispatch Template",
            "Version: 0.0.1",
            "Authors@R: person(\"Test\", \"User\", email = \"test@example.com\", role = c(\"aut\", \"cre\"))",
            "Description: Minimal package generated during continuous integration to test the copied SIMD dispatch template.",
            "License: GPL (>= 2)",
            "Encoding: UTF-8"
          ), file.path(tmp, "DESCRIPTION"))
          dir.create(file.path(tmp, "R"))
          RsimdDispatch::use_simd_dispatch(tmp, pkg = "TestSIMD", prefix = "testsimd", overwrite = TRUE)
          writeLines(
            "export(count_nonzero)\nexport(convolve1d)\nexport(simd_backend)\nexport(simd_info)\nexport(simd_set_backend)\nuseDynLib(TestSIMD, .registration = TRUE)",
            file.path(tmp, "NAMESPACE")
          )
          status <- system2(file.path(R.home("bin"), "R"), c("CMD", "INSTALL", "--preclean", tmp))
          if (!identical(status, 0L)) quit(status = status)
          library(TestSIMD)
          x <- as.raw(c(0, 1, 2, 0, 255))
          stopifnot(identical(count_nonzero(x), 3))
          slow_convolve <- function(a, b) {
            ab <- double(length(a) + length(b) - 1L)
            for (i in seq_along(a)) {
              for (j in seq_along(b)) {
                ab[i + j - 1L] <- ab[i + j - 1L] + a[i] * b[j]
              }
            }
            ab
          }
          a <- seq(-2, 3, length.out = 17)
          b <- c(0.25, -0.5, 0.75, 1.25, -0.125)
          ref <- slow_convolve(a, b)
          info <- simd_info()
          stopifnot("scalar" %in% info$available_backends)
          stopifnot("scalar" %in% info$operation_backends$count_nonzero)
          stopifnot("scalar" %in% info$operation_backends$convolve1d)
          for (backend in info$available_backends) {
            simd_set_backend(backend)
            stopifnot(identical(count_nonzero(x), 3))
            if (backend %in% info$operation_backends$convolve1d) {
              stopifnot(isTRUE(all.equal(convolve1d(a, b), ref, tolerance = 1e-12)))
            } else {
              stopifnot(inherits(try(convolve1d(a, b), silent = TRUE), "try-error"))
            }
          }
          simd_set_backend("auto")
          stopifnot(simd_backend() %in% info$available_backends)
          EOF

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
