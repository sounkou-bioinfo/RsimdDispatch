# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,     r: 'release'}
          - {os: windows-latest,   r: 'release'}
          - {os: windows-11-arm,   r: 'release'}
          - {os: ubuntu-24.04-arm, r: 'release'}
          - {os: ubuntu-latest,    r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,    r: 'release'}
          - {os: ubuntu-latest,    r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check template sync
        if: runner.os == 'Linux'
        run: make check-template-sync

      - name: Install copied template package
        if: runner.os == 'Linux'
        run: |
          R CMD INSTALL --preclean .
          Rscript -e 'tmp <- file.path(tempdir(), "TestSIMD"); dir.create(tmp); writeLines(c("Package: TestSIMD", "Title: Test SIMD Dispatch Template", "Version: 0.0.1", "Authors@R: person(\"Test\", \"User\", email = \"test@example.com\", role = c(\"aut\", \"cre\"))", "Description: Minimal package generated during continuous integration to test the copied SIMD dispatch template.", "License: GPL (>= 2)", "Encoding: UTF-8"), file.path(tmp, "DESCRIPTION")); dir.create(file.path(tmp, "R")); RsimdDispatch::use_simd_dispatch(tmp, pkg = "TestSIMD", prefix = "testsimd", overwrite = TRUE); writeLines("export(count_nonzero)\nexport(simd_backend)\nexport(simd_info)\nexport(simd_set_backend)\nuseDynLib(TestSIMD, .registration = TRUE)", file.path(tmp, "NAMESPACE")); status <- system2(file.path(R.home("bin"), "R"), c("CMD", "INSTALL", "--preclean", tmp)); quit(status = status)'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
