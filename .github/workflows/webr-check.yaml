name: webR check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  webr-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build webR package with rwasm
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            ghcr.io/r-wasm/webr:main \
            bash -lc '
              set -euxo pipefail
              rm -rf RsimdDispatch.Rcheck ..Rcheck README.html RsimdDispatch_*.tar.gz RsimdDispatch_*.tgz \
                     src/Makevars src/Makevars.win src/config.h src/rsd-kernels \
                     src/*.o src/*.so src/*.dll src/*.dylib
              R CMD build --no-build-vignettes .
              Rscript -e "if (!requireNamespace(\"pak\", quietly = TRUE)) install.packages(\"pak\", repos = \"https://repo.r-wasm.org/\"); pak::pak(\"r-wasm/rwasm\", ask = FALSE)"
              version=$(Rscript -e "cat(read.dcf(\"DESCRIPTION\")[1, \"Version\"])")
              Rscript -e "version <- read.dcf(\"DESCRIPTION\")[1, \"Version\"]; tarball <- sprintf(\"./RsimdDispatch_%s.tar.gz\", version); stopifnot(file.exists(tarball)); rwasm::build(tarball)"
              test -f "RsimdDispatch_${version}.tgz"
            '

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install webR Node package
        shell: bash
        run: npm install --prefix "$RUNNER_TEMP/webr-node" --no-save webr@0.5.9

      - name: Check local webR package
        shell: bash
        env:
          NODE_PATH: ${{ runner.temp }}/webr-node/node_modules
        run: node tools/webr-check.cjs "$(ls -t RsimdDispatch_*.tgz | head -n 1)"

      - name: Upload webR package artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rsimddispatch-webr-artifacts
          path: |
            RsimdDispatch_*.tar.gz
            RsimdDispatch_*.tgz
          if-no-files-found: ignore
